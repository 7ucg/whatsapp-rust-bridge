# Native bridge — build for the host platform.
#
# The root .cargo/config.toml forces wasm32-unknown-unknown which breaks native
# builds. Override it by always passing --target explicitly on the command line:
#
#   Windows x86_64:   cargo build --release --target x86_64-pc-windows-msvc
#   Linux x86_64:     cargo build --release --target x86_64-unknown-linux-gnu
#   macOS arm64:      cargo build --release --target aarch64-apple-darwin
#   Android arm64:    cargo build --release --target aarch64-linux-android
#                     (requires NDK + cargo-ndk)
#
# The Makefile / build.sh in this directory handle the target selection
# automatically for you.

[target.x86_64-pc-windows-msvc]
rustflags = []

[target.x86_64-unknown-linux-gnu]
rustflags = []

[target.aarch64-apple-darwin]
rustflags = []

[target.x86_64-apple-darwin]
rustflags = []

[target.aarch64-unknown-linux-gnu]
rustflags = []

[target.aarch64-linux-android]
# linker = "aarch64-linux-android21-clang"  # uncomment when using NDK
rustflags = []
